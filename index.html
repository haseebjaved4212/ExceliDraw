<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Excalidraw Clone</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <div id="ui-layer">
        <div id="toolbar" class="panel">
          <button data-tool="select" class="active" title="Select (V)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg></button>
          <button data-tool="rectangle" title="Rectangle (R)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></button>
          <button data-tool="ellipse" title="Ellipse (O)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></button>
          <button data-tool="diamond" title="Diamond (D)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 12l10 10 10-10L12 2z"/></svg></button>
          <button data-tool="arrow" title="Arrow (A)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
          <button data-tool="line" title="Line (L)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"></line></svg></button>
          <button data-tool="pen" title="Pen (P)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg></button>
          <button data-tool="laser" title="Laser (K)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="19.36" x2="19.78" y2="20.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
          <button data-tool="eraser" title="Eraser (E)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg></button>
        </div>

        <div id="style-panel" class="panel">
           <div class="style-section">
             <span class="style-title">Stroke</span>
             <div class="color-swatches" id="stroke-swatches">
                <button class="color-swatch active" style="background-color: #1e1e1e" data-color="#1e1e1e"></button>
                <button class="color-swatch" style="background-color: #e03131" data-color="#e03131"></button>
                <button class="color-swatch" style="background-color: #2b8a3e" data-color="#2b8a3e"></button>
                <button class="color-swatch" style="background-color: #1971c2" data-color="#1971c2"></button>
                <button class="color-swatch" style="background-color: #f08c00" data-color="#f08c00"></button>
             </div>
           </div>
           <div class="style-section">
             <span class="style-title">Background</span>
             <div class="color-swatches" id="fill-swatches">
                <button class="color-swatch active transparent-swatch" data-color="transparent"></button>
                <button class="color-swatch" style="background-color: #ffc9c9" data-color="#ffc9c9"></button>
                <button class="color-swatch" style="background-color: #b2f2bb" data-color="#b2f2bb"></button>
                <button class="color-swatch" style="background-color: #a5d8ff" data-color="#a5d8ff"></button>
                <button class="color-swatch" style="background-color: #ffec99" data-color="#ffec99"></button>
                <button class="color-swatch" style="background-color: #e9ecef" data-color="#e9ecef"></button>
             </div>
           </div>
        </div>

        <div id="actions-panel" class="panel">
          <button id="btn-undo" title="Undo (Ctrl+Z)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button>
          <button id="btn-redo" title="Redo (Ctrl+Y)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg></button>
          <button id="btn-toggle-theme" title="Toggle Theme (Shift+D)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
          <button id="btn-export-png" title="Export PNG">PNG</button>
          <button id="btn-export-json" title="Export JSON">JSON</button>
          <input type="file" id="input-import-json" accept=".json" style="display: none;" />
          <button id="btn-import-json" title="Import JSON">Import</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
